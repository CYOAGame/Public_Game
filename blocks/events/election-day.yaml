  election_lessons:
    id: election_lessons
    text: >-
      What the election revealed about Ironhaven stays with you. The split was narrower
      than the factions admitted. The people who stayed home were more numerous than the
      people who voted, and nobody is talking about why. The recorder was present and
      three parties commissioned records. The outcome was not inevitable. It was shaped
      by specific decisions by specific people, including you, on that specific day.
      The next election will be different, in part because of what happened in this one.
    choices:
      - id: apply_the_lessons
        label: Apply the lessons now. The next cycle begins before the current one ends.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: let_the_lessons_settle
        label: Let the lessons settle. You need distance before you can use what you learned.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
