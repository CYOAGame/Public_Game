  election_council_dynamics:
    id: election_council_dynamics
    text: >-
      You attend a public council session three weeks after the election. The new
      dynamic is visible immediately: the winner leads but has not yet established
      dominance, the returning members are testing the limits of the new arrangement,
      and the citizens who voted are already expecting something. The winner's first
      significant decision is going to tell everyone more about them than all the
      campaign promises did.
    choices:
      - id: position_for_first_decision
        label: Position yourself to be relevant to the winner's first significant decision
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: watch_first_decision_unfold
        label: Watch the first decision from outside. You want to understand the new structure first.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
