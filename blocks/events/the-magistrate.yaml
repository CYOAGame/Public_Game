  magistrate_network_built:
    id: magistrate_network_built
    text: >-
      The magistrate has a network in Ironhaven and you have become part of it,
      knowingly or not. The way information flows to them, through whom, at what
      speed, says something about what they value and who they trust. You are
      positioned somewhere in that structure, not at the center, but not at
      the edge either. What you do with that position is the question you are
      being asked, even though nobody will put it that way directly.
    choices:
      - id: use_position_actively
        label: Use your position actively. You are inside the network and should move within it.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: magistrate_ally
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: understand_before_acting
        label: Take time to understand the full shape of the network before committing to any role in it
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: magistrate_ally
            value: true
        exhaustionCost: 0
        nextNodeId: null

  magistrate_capital_question:
    id: magistrate_capital_question
    text: >-
      The magistrate has asked, indirectly, about your connections to the capital.
      Or the lack of them. Or whether you are the kind of person who could develop
      them. The question was phrased as a general observation about Ironhaven's
      isolation, but you heard the real question underneath it. The capital matters
      to whatever the magistrate is building here, and they want to know if you
      are an asset in that direction.
    choices:
      - id: say_you_can_help_with_capital
        label: Say you can help with that, without specifying how yet
        consequences:
          - type: relationship
            target: '{magistrate.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: magistrate_ally
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: be_honest_about_capital_connections
        label: Be honest about what you have and what you do not have
        consequences:
          - type: relationship
            target: '{magistrate.id}'
            value: 1
            axis: respect
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: null
