  den_hunter_bond:
    id: den_hunter_bond
    text: >-
      What you did with the hunter in the Ashwood sits between you differently now.
      They are not someone you hired or helped. They are someone who knows what you
      know, who was in the same wood at the same hour, who made the same calculation
      about the den and the binding and the wolves. That is a particular kind of trust,
      built in a particular kind of place. It does not need naming to be useful.
    choices:
      - id: build_on_the_trust
        label: Build on what was established. The hunter is more useful as an ally than as a contact.
        consequences:
          - type: relationship
            target: '{hunter.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: wolf_territory_understood
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: keep_it_professional
        label: Keep it professional. Shared experience is not the same as shared goals.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  den_territorial_question:
    id: den_territorial_question
    text: >-
      The question the den raised was not really about wolves. It was about whose
      territory the Ashwood is. The wolves have prior claim by any reasonable accounting.
      Ironhaven's claim is newer, louder, and backed by fence-posts and market days.
      What you found in the Ashwood adds a third claim: something older than either.
      You are the only one who has stood in all three of those overlapping territories.
      What you do with that is not a simple question.
    choices:
      - id: advocate_for_careful_boundary
        label: Advocate for a careful boundary. Humans should know where they are not welcome.
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: wolf_territory_understood
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: let_the_territory_sort_itself
        label: Let the territory sort itself. These things have been working out for longer than the town.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
