id: wandering_priest
name: The Wandering Priest
tags:
  - social
  - faith
  - intrigue
storyline: faith_and_superstition
chapter: 1
reentry_recap: "The priest has settled at the inn for a night. Whatever you thought of the sermon, they are still here."
escalation:
  chance_base: 0.15
  advances_to: healer_in_need
  world_facts_set:
    priest_welcomed: true

preconditions: []

roles:
  - id: priest
    label: A Wandering Priest
    traitRequirements:
      charisma:
        min: 5
  - id: townsperson
    label: A Skeptical Townsperson
    archetypeFilter:
      - farmer
      - merchant
      - blacksmith

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      A robed figure stands on the well's rim in the square, one hand raised, voice carrying
      over the noise of the market. {priest.name} speaks of signs: cattle restless at night,
      stars out of place, a darkness moving from the east. "The old darkness is returning,"
      they call out. "And we are not ready." {townsperson.name} stands nearby rolling their
      eyes. Others look uncertain. A few look afraid.
    choices:
      - id: stop_and_listen
        label: Stop and listen seriously to what the priest is saying
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: debate_openly
        label: Step forward and debate the priest's claims in front of the crowd
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: -1
            axis: rivalry
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 2
        nextNodeId: debated
      - id: watch_the_crowd
        label: Hang back and watch how the crowd reacts rather than the priest
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: watched_crowd
      - id: ignore_and_walk_on
        label: Keep walking, town squares always have someone predicting the end
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: ignored

  watched_crowd:
    id: watched_crowd
    text: >-
      You count twelve people actively listening, four who have slowed without stopping,
      three who are visibly frightened. {townsperson.name} catches your eye and gives a
      dismissive shrug. But behind {townsperson.name}, you notice the miller's wife, whose
      husband has been sick three weeks, gripping her basket with white knuckles and hanging
      on every word. The priest is not speaking to everyone. They are speaking to the people
      who already suspect something is wrong.
    choices:
      - id: speak_to_frightened
        label: After the sermon, speak to the frightened people, not the priest
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: spoke_to_fearful
      - id: find_priest_from_crowd
        label: Find the priest when the crowd thins, you have questions
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: check_signs_yourself
        label: Go check the cattle and the sky yourself, before deciding what the priest knows
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: checked_priest_signs
            value: true
        exhaustionCost: 2
        nextNodeId: checked_signs

  checked_signs:
    id: checked_signs
    text: >-
      The cattle are restless. That is true. They have been restless for a week and the
      farmers you ask are already worried about it, they have not connected it to the priest's
      arrival. The stars are harder to check in daylight. But you find the shepherd on the
      north slope who mentions, unprompted, that the night sky "looks different" from the
      northeast, a quality of light he cannot name. The priest was not inventing their evidence.
      They observed it. The question is what they concluded from it.
    choices:
      - id: find_priest_after_checking
        label: Find the priest and tell them what you found, honestly
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: heard_priest_warning
            value: true
          - type: world_fact
            target: checked_priest_signs
            value: true
        exhaustionCost: 1
        nextNodeId: private_conversation
      - id: keep_findings_to_self
        label: Keep your findings to yourself for now, the signs are real but the interpretation is yours to make
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: checked_priest_signs
            value: true
        exhaustionCost: 0
        nextNodeId: ignored

  spoke_to_fearful:
    id: spoke_to_fearful
    text: >-
      The miller's wife tells you her husband woke three nights ago speaking in a language
      he does not know. She thought it was fever. But his fever broke the next morning, and
      he still remembers the words, though not what they mean. An old farmer nearby nods,
      says his dog has been barking at the cellar under Tanner's Row. "The sealed one," he
      says. "Never barked at it before." He doesn't know you have been inside. His dog does,
      apparently.
    choices:
      - id: take_farmer_to_priest
        label: Bring the farmer and the miller's wife to the priest, these are the testimonies they need
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: priest_given_evidence
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: file_testimonies_away
        label: Thank them and file the information. You are not ready to involve the priest yet.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 0
        nextNodeId: ignored

  listened:
    id: listened
    text: >-
      After the crowd thins, {priest.name} steps down and finds you. Up close their eyes are
      calm, not feverish, not mad. "You heard me," they say simply. "Most do not. They will."
      They offer you a small token, a carved wooden disc with a sun-and-crown symbol. "If the
      darkness comes to your door, this is a reminder of what you are defending." Up close,
      they look tired in the way of people who have been delivering the same warning for a
      long time without being believed.
    choices:
      - id: accept_token
        label: Accept the token with thanks
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_token_held
            value: true
        exhaustionCost: 0
        nextNodeId: token_accepted
      - id: ask_where_they_come_from
        label: Ask where they have travelled from and what they have seen
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: priest_history
      - id: ask_about_darkness
        label: Ask them specifically what they mean by the old darkness
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: private_conversation

  token_accepted:
    id: token_accepted
    text: >-
      The token sits warm in your hand. The carving is old work, not new. {priest.name}
      watches you turn it over. "That was my order's token," they say. "Before the order
      dissolved. Seven of us left when the see was closed. I am the last still traveling."
      They fold their hands. "There is no institution behind me. Just what I know, and what
      I have seen, and the road."
    choices:
      - id: ask_about_dissolved_order
        label: Ask what happened to the order and why the see was closed
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: priest_history
      - id: offer_meal
        label: Offer them a meal, they look like they have been on the road a long time
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: affection
        exhaustionCost: 1
        nextNodeId: private_conversation

  priest_history:
    id: priest_history
    text: >-
      {priest.name} tells you they have come from the east, from two towns that are now
      empty, and one that is not empty but wishes it were. They describe what they saw with
      the flat precision of someone who has processed their horror and converted it into
      reportable fact. The invasion is real. It is moving west. And it is accompanied, in
      each town before it falls, by the same signs: restless livestock, strange dreams,
      a feeling of pressure in the air that people interpret as weather.
    choices:
      - id: ask_about_demon_connection
        label: Ask if they know anything about what the darkness wants, specifically
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: heard_priest_warning
            value: true
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 2
        nextNodeId: private_conversation
      - id: share_your_own_knowledge
        label: Share what you know about the cellar and the binding site, if you know it
        preconditions:
          - type: world_fact
            key: cellar_opened
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: priest_knows_about_cellar
            value: true
        exhaustionCost: 2
        nextNodeId: private_conversation
      - id: take_history_as_warning
        label: Thank them for the account and excuse yourself, you have heard enough
        consequences:
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 0
        nextNodeId: priest_staying_impact

  private_conversation:
    id: private_conversation
    text: >-
      {priest.name} leans forward. They have been waiting for someone to ask the right
      question, and you have been asking them. "The darkness is not armies," they say.
      "It is purpose. There is something it is trying to reach. Something that was sealed
      away a long time ago." They look at you steadily. "I think you already know this,
      or you have begun to know it. That is why you are still talking to me."
    choices:
      - id: confirm_knowledge
        label: Confirm you know about the cellar and ask what the priest knows about it
        preconditions:
          - type: world_fact
            key: cellar_opened
            value: true
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: priest_knows_about_cellar
            value: true
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 2
        nextNodeId: priest_revelation
      - id: stay_noncommittal
        label: Stay noncommittal, you are not sure how much to trust this person yet
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: ask_what_the_priest_wants
        label: Ask plainly what the priest wants from you
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: respect
        exhaustionCost: 1
        nextNodeId: priest_revelation

  priest_revelation:
    id: priest_revelation
    text: >-
      "I want nothing from you," {priest.name} says. "I want Ironhaven to still be here
      in a year. I have watched five towns make the wrong choice when the pressure started.
      The wrong choice was not always the same one. Fear, denial, scapegoating, premature
      action. The darkness doesn't need you to fail in any particular way. It just needs
      the seal to break." They fold their hands. "I will stay if I am welcome. I will go
      if I am not. Either way, you know what I know now."
    choices:
      - id: welcome_priest
        label: Welcome them to stay as long as they need
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_welcomed
            value: true
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 0
        nextNodeId: priest_settling_in
      - id: ask_priest_to_keep_quiet
        label: Welcome them, but ask them to stop preaching until you have a plan
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: priest_welcomed
            value: true
        exhaustionCost: 1
        nextNodeId: priest_settling_in
      - id: thank_and_let_go
        label: Thank them for the warning and let them decide for themselves
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 0
        nextNodeId: priest_staying_impact

  debated:
    id: debated
    text: >-
      The crowd leans in. You make reasonable points: correlation is not prophecy, fear
      serves the powerful, and cattle are always restless when the weather turns. {priest.name}
      listens carefully and then says: "You argue well. I hope you are right." They say it
      without malice. {townsperson.name} nods vigorously in your direction. But a few faces
      in the crowd look privately unconvinced by your confidence.
    choices:
      - id: soften_after
        label: Find the priest after and admit their argument gave you pause
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: respect
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: ask_townsperson_view
        label: Ask {townsperson.name} what they actually think now that the crowd has gone
        consequences:
          - type: relationship
            target: '{townsperson.id}'
            value: 1
            axis: trust
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: sermon_aftermath
      - id: stand_by_your_words
        label: Stand by what you said, you believe it
        consequences:
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: sermon_aftermath

  ignored:
    id: ignored
    text: >-
      You are twenty paces away when a child's voice cuts through: "But what if they are
      right?" You do not stop. But the question follows you the rest of the day, settling
      in alongside the other things you have been trying not to think about.
    choices:
      - id: find_priest_later
        label: Find the priest later in the day and hear them out after all
        consequences:
          - type: world_fact
            target: heard_priest_warning
            value: true
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: listened
      - id: let_it_go
        label: Let it go. You have enough to worry about.
        consequences: []
        exhaustionCost: 0
        nextNodeId: null

  sermon_aftermath:
    id: sermon_aftermath
    text: >-
      The sermon has unsettled more people than it converted. {townsperson.name} has been
      telling anyone who will listen that the priest is a charlatan. Three families have
      asked their children to avoid the well square when the priest is there. But the miller's
      wife still has her grain stored in her cellar rather than the town granary, which she
      moved there the morning after the sermon. People respond to prophecy with their behavior
      before they respond with their words.
    choices:
      - id: watch_behavior_change
        label: Begin tracking which townspeople are quietly changing their behavior
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: town_fear_pattern
      - id: speak_to_miller_wife
        label: Speak to the miller's wife specifically about why she moved her grain
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 1
        nextNodeId: fearful_witness
      - id: ignore_aftershock
        label: Ignore the aftershock. Sermons always disturb things briefly.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  town_fear_pattern:
    id: town_fear_pattern
    text: >-
      The pattern becomes clear over five days. It is not the priest's predictions that
      people are responding to, it is the signs the priest described. The cattle have been
      restless for three weeks before the sermon. The northeast sky does look different at
      night. Two people mention dreams unprompted, before you ask. The priest did not cause
      the fear. The fear was already there. The priest simply gave it a name and a direction.
    choices:
      - id: take_pattern_to_priest
        label: Go to {priest.name} with what you have found. They need to know the town is already responding.
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_given_evidence
            value: true
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: priest_revelation
      - id: take_pattern_to_elder
        label: Take the pattern to the elder, this is a community concern not a religious one
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: use_pattern_as_evidence
        label: Use the pattern as evidence that something is actually wrong, regardless of the priest
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: checked_priest_signs
            value: true
        exhaustionCost: 1
        nextNodeId: null

  fearful_witness:
    id: fearful_witness
    text: >-
      The miller's wife is direct once you ask the right question. "My husband has been
      speaking in his sleep for three weeks. Words I do not know. Last night he woke up
      and said: it is trying to come back up. He did not remember saying it in the morning."
      She folds her hands in her lap. "I moved the grain because if we need to leave quickly,
      I need to know where everything is." She has already made her decision about the priest's
      sermon. She believes it. She just does not want to say so in public.
    choices:
      - id: tell_priest_about_miller
        label: Tell {priest.name} about the miller's wife and husband
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_given_evidence
            value: true
        exhaustionCost: 1
        nextNodeId: private_conversation
      - id: connect_millers_words_to_cellar
        label: Connect the husband's words to the cellar below the town, if you know about it
        preconditions:
          - type: world_fact
            key: cellar_opened
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: prophecy_known
            value: true
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: priest_revelation
      - id: keep_millers_account
        label: Keep the account to yourself, do not involve the priest yet
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 0
        nextNodeId: null

  priest_staying_impact:
    id: priest_staying_impact
    text: >-
      Whether {priest.name} stays or goes, their presence has changed something in the town's
      atmosphere. Conversations that would have been private are happening in doorways. Three
      people have come to you specifically, because you were seen talking to the priest, to ask
      what you think. You have become, without intending it, an intermediary between the priest's
      warning and the town's response. That is a position with influence and risk in equal measure.
    choices:
      - id: use_intermediary_role
        label: Use the intermediary role deliberately, you can shape how the town processes this
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: priest_welcomed
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: step_back_from_role
        label: Step back. You do not want to be the translator for a prophecy you may not believe.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  priest_settling_in:
    id: priest_settling_in
    text: >-
      {priest.name} takes a room at the inn and does not preach again, at least not from
      the well. Instead they walk. They are present in the lanes, at the market, at the
      edge of conversations without inserting themselves. People who were frightened by the
      sermon find themselves talking to them anyway. This is more effective than preaching:
      {priest.name} is not performing prophecy, they are discussing it, quietly, one person
      at a time.
    choices:
      - id: join_priests_quiet_work
        label: Join what {priest.name} is doing. Sit with them in lanes and listen to who comes.
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: priest_welcomed
            value: true
        exhaustionCost: 2
        nextNodeId: priest_community_role
      - id: let_priest_work_alone
        label: Let {priest.name} work in their own way. You will be available if they need you.
        consequences:
          - type: world_fact
            target: priest_welcomed
            value: true
        exhaustionCost: 0
        nextNodeId: priest_community_role
      - id: check_what_priest_learns
        label: Check in regularly with {priest.name} to compare what they are hearing with what you know
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: priest_given_evidence
            value: true
        exhaustionCost: 1
        nextNodeId: priest_gathered_knowledge

  priest_gathered_knowledge:
    id: priest_gathered_knowledge
    text: >-
      A week in, {priest.name} has spoken privately with eleven people in Ironhaven. They
      share their summary with you without being asked. Five of those eleven had either
      strange dreams, unexplained livestock behavior, or the specific feeling of pressure
      from below. Two knew about the cellar on Tanner's Row from family memory. One used
      the phrase "the thing that sleeps" without having heard it from anyone. The priest
      says: "It is more awake than it was. It is not alarming people directly. It is
      reaching into them through proximity."
    choices:
      - id: act_on_priest_summary
        label: Act on the summary. More people know than you realised, and they need guidance.
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: heard_priest_warning
            value: true
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: keep_summary_between_you
        label: Keep the summary between you and the priest. The broader town is not ready.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: connect_to_cellar_knowledge
        label: Connect what the priest found to what you know about the cellar
        preconditions:
          - type: world_fact
            key: cellar_opened
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: priest_knows_about_cellar
            value: true
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 1
        nextNodeId: null

  priest_in_conflict:
    id: priest_in_conflict
    text: >-
      Not everyone in Ironhaven is comfortable with {priest.name}. {townsperson.name} has
      been quietly building a case: the priest is a manipulator, playing on fear for their
      own influence. Three merchants have begun refusing to let the priest sit near their
      stalls. The tension is manageable now but will not stay that way. The priest knows.
      They come to you and ask: "Do you want me to leave? I would understand."
    choices:
      - id: ask_priest_to_stay
        label: Ask {priest.name} to stay. The tension is worth the knowledge.
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: faction
            target: village_folk
            value: -1
          - type: world_fact
            target: priest_welcomed
            value: true
        exhaustionCost: 1
        nextNodeId: priest_departure_question
      - id: suggest_priest_move_on
        label: Suggest {priest.name} move on. They have given Ironhaven what it needed.
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: respect
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 0
        nextNodeId: priest_departure_question
      - id: address_townsperson_directly
        label: Address {townsperson.name}'s campaign against the priest directly
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 1
          - type: relationship
            target: '{townsperson.id}'
            value: -1
            axis: rivalry
        exhaustionCost: 2
        nextNodeId: null

  priest_community_role:
    id: priest_community_role
    text: >-
      The priest has found a role in Ironhaven that was not formally assigned. People
      who will not speak to the elder will speak to the priest. Grievances that have no
      official channel pass through that conversation instead. The priest is becoming
      a kind of informal arbiter, not by design, but by availability. Whether that
      stabilises the town or complicates its existing structures depends on who controls
      the framing of what the priest does.
    choices:
      - id: support_priests_informal_role
        label: Support the role quietly. An informal arbiter is useful in a town this factionalized.
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: priest_settled
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: name_the_role_to_the_elder
        label: Name what the priest is doing to {elder_leader.name} and let them decide how to respond
        consequences:
          - type: relationship
            target: '{elder_leader.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: priest_settled
            value: true
        exhaustionCost: 1
        nextNodeId: null

  priest_departure_question:
    id: priest_departure_question
    text: >-
      Word is spreading that another town is asking for the priest. They have not
      decided yet. You have been around long enough now to have a view on what their
      leaving would cost. The priest asks, one afternoon, whether you think they should
      stay. That is a genuine question. They are not asking for flattery.
    choices:
      - id: say_you_want_them_to_stay
        label: Say you think they should stay, and say why honestly
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_settled
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: say_it_is_their_choice
        label: Say it is entirely their choice. You will not place that weight on them.
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: respect
        exhaustionCost: 0
        nextNodeId: null
      - id: ask_what_they_want
        label: Turn the question around. Ask what they want, not what you need.
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: affection
        exhaustionCost: 0
        nextNodeId: null
