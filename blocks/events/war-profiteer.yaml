id: war_profiteer
name: The War Profiteer
tags:
  - faction
  - questline
  - intrigue
storyline: demon_war
chapter: 2
reentry_recap: "The border has fallen. While others mourn, someone is already counting their coins. You have crossed their path."
escalation:
  chance_base: 0.15
  advances_to: siege_preparations
  world_facts_set:
    profiteer_confronted: true

preconditions:
  - type: questline_stage
    key: demon_invasion
    value: border_falls
    operator: gte

roles:
  - id: profiteer
    label: A Price-Gouging Merchant
    archetypeFilter:
      - merchant
    traitRequirements:
      cunning:
        min: 4
  - id: poor_buyer
    label: A Desperate Buyer
    archetypeFilter:
      - farmer
      - blacksmith

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      The market has changed overnight. Bread: triple the price. Iron: four times. Rope: if
      you can find it. {profiteer.name} stands behind their stall with a ledger and the calm
      of someone who has planned for exactly this. {poor_buyer.name} is arguing with an
      assistant, holding out coins that are not enough. The crowd watches, muttering. Nobody
      is doing anything. The word from the eastern roads has reached here before any soldier has.
    choices:
      - id: hoard_goods
        label: Quietly buy as much as you can afford, you will need it
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: village_folk
            value: -2
          - type: world_fact
            target: hoarded_supplies
            value: true
        exhaustionCost: 2
        nextNodeId: hoarded
      - id: share_supplies
        label: Use your own stockpile to help {poor_buyer.name} and others
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 3
          - type: relationship
            target: '{poor_buyer.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: shared_supplies
            value: true
        exhaustionCost: 3
        nextNodeId: shared
      - id: confront_profiteer
        label: Confront {profiteer.name} publicly about the prices
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: merchants_guild
            value: -2
          - type: faction
            target: village_folk
            value: 2
          - type: relationship
            target: '{profiteer.id}'
            value: -3
            axis: rivalry
        exhaustionCost: 2
        nextNodeId: confronted_profiteer
      - id: approach_profiteer_privately
        label: Approach {profiteer.name} privately and try to negotiate, away from the crowd
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{profiteer.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: private_negotiation
      - id: do_nothing
        label: Walk past, this is how war economies work
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: village_folk
            value: -1
        exhaustionCost: 0
        nextNodeId: did_nothing

  hoarded:
    id: hoarded
    text: >-
      You leave with your arms full. The looks follow you out. That night, your stores are
      full and the town's are not. You will not go hungry. Whether that makes you clever or
      something else depends on who is doing the judging. Outside, someone in the square is
      arguing again, a raised voice and the particular silence that follows when a person
      walks away with nothing.
    choices:
      - id: share_some
        label: Reconsider, share some of what you bought
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: stat
            target: charisma
            value: 1
          - type: world_fact
            target: shared_supplies
            value: true
        exhaustionCost: 2
        nextNodeId: community_response
      - id: keep_it_all
        label: Keep it. You look after yourself.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: profiteer_justifies

  shared:
    id: shared
    text: >-
      By evening, word has spread. People come to you not with money, but with labor, with
      small gifts, with the specific gratitude of people who did not expect to be helped. It
      costs you materially. The look on {poor_buyer.name}'s face when you handed them the
      bread stays with you longer than the silver you lost. {profiteer.name} watches from
      across the square with an expression that is hard to read.
    choices:
      - id: keep_helping
        label: Keep your door open for those who need it
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: community_fed
            value: true
        exhaustionCost: 3
        nextNodeId: community_response
      - id: set_limits
        label: Help where you can, but set limits, you have your own needs
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: community_response

  confronted_profiteer:
    id: confronted_profiteer
    text: >-
      {profiteer.name} does not back down. "Supply and demand," they say. "Same as it has
      always been." But the crowd is with you, and they feel it. Three other merchants
      quietly lower their prices. {profiteer.name} watches this with visible calculation
      and drops their prices slightly. Not because they want to. Because the crowd is still
      watching. They have not become a different person; they have made a different
      calculation.
    choices:
      - id: push_for_price_controls
        label: Push the council for emergency price controls while the crowd is behind you
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: faction
            target: merchants_guild
            value: -2
          - type: world_fact
            target: price_controls_proposed
            value: true
        exhaustionCost: 3
        nextNodeId: council_debate
      - id: accept_small_win
        label: Accept the small win and move on
        consequences:
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 0
        nextNodeId: profiteer_justifies

  private_negotiation:
    id: private_negotiation
    text: >-
      Away from the crowd, {profiteer.name} is more candid. "I have bought everything I
      can carry from the eastern suppliers at cost. The siege will come. When it does, those
      stores are what stands between this town and starvation." They meet your eyes. "Yes,
      I profit. But I also took the risk when no one else did. I need that margin to keep
      buying more. I am not your enemy." You cannot tell if they believe this or if they
      have simply told it often enough.
    choices:
      - id: believe_them
        label: Decide there is logic in it, an uneasy alliance is still an alliance
        consequences:
          - type: relationship
            target: '{profiteer.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: profiteer_allied
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: profiteer_justifies
      - id: reject_the_logic
        label: Reject the justification. Self-interest dressed up as service is still self-interest.
        consequences:
          - type: relationship
            target: '{profiteer.id}'
            value: -2
            axis: rivalry
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: confronted_profiteer

  did_nothing:
    id: did_nothing
    text: >-
      {poor_buyer.name} walks away empty-handed. The market settles into its new prices as if
      they have always been this way. Tomorrow they will be higher. You know this. You did the
      accounting and walked away. It was the rational choice. Three days later, you will hear
      that {poor_buyer.name}'s family went without for two days before a neighbor helped them.
    choices:
      - id: check_on_poor_buyer
        label: Find {poor_buyer.name} later and quietly offer what you can
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: trust
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: community_response
      - id: move_on
        label: Move on. There will be more of this before it is over.
        consequences: []
        exhaustionCost: 0
        nextNodeId: profiteer_justifies

  profiteer_justifies:
    id: profiteer_justifies
    text: >-
      {profiteer.name} makes the rounds that evening, buying drinks at the tavern, telling
      anyone who will listen that they are simply doing what the market demands. Most people
      accept this with the weary pragmatism of people who know they cannot afford to refuse
      whatever {profiteer.name} is selling. One or two look thoughtful. One looks angry.
      The town is forming positions that will matter when things get worse.
    choices:
      - id: counter_the_narrative
        label: Counter the narrative quietly, let people know what is actually happening
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: faction
            target: merchants_guild
            value: -1
          - type: world_fact
            target: profiteer_narrative_contested
            value: true
        exhaustionCost: 2
        nextNodeId: council_debate
      - id: let_it_go
        label: Let people believe what they want, you cannot fight every battle
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: community_response

  council_debate:
    id: council_debate
    text: >-
      The council meets. {profiteer.name} is there, invited, because they cannot exclude
      the largest current grain holder in the town. The debate is civil until it is not.
      Arguments about property, necessity, community. {profiteer.name} offers a compromise:
      a fixed price on basic staples if the council grants them the sole supply contract
      for the siege period. It is a trap or a lifeline, depending on how the siege goes.
    choices:
      - id: support_compromise
        label: Support the compromise, it gets food to people now
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: faction
            target: merchants_guild
            value: 1
          - type: relationship
            target: '{profiteer.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: supply_contract_granted
            value: true
        exhaustionCost: 1
        nextNodeId: community_response
      - id: reject_compromise
        label: Reject it, the sole contract gives them too much power over the siege
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: faction
            target: merchants_guild
            value: -2
          - type: world_fact
            target: supply_contract_rejected
            value: true
        exhaustionCost: 2
        nextNodeId: community_response

  community_response:
    id: community_response
    text: >-
      Whatever was decided at the stall or the council table, the town is now sorting itself
      into people who can weather the siege economy and people who cannot. {poor_buyer.name}
      is managing. Barely. The question of how this town treats its most vulnerable in a
      crisis will be answered over the next week, not today. But today was where the answer
      began.
    choices:
      - id: organize_mutual_aid
        label: Start organizing a neighborhood mutual aid arrangement, people helping people
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 3
          - type: world_fact
            target: mutual_aid_organized
            value: true
        exhaustionCost: 3
        nextNodeId: mutual_aid_takes_shape
      - id: approach_poor_buyer_again
        label: Check in with {poor_buyer.name} directly, make sure they are not falling through the cracks
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: affection
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 1
        nextNodeId: poor_buyer_conversation
      - id: watch_and_wait
        label: The situation is as handled as it is going to be for now, watch and wait
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: profiteer_watches

  mutual_aid_takes_shape:
    id: mutual_aid_takes_shape
    text: >-
      You spend the afternoon going door to door. The idea is simple: everyone puts in
      what they can and takes what they need, tracked honestly, settled after the crisis.
      Most people say yes. A few look skeptical. Two say no outright, they do not trust
      the arrangement, they will manage themselves. By evening you have the shape of something
      real. Not enough to replace a working market. Enough to keep the gaps from becoming
      catastrophic.
    choices:
      - id: put_yourself_in_charge
        label: Take responsibility for managing the arrangement yourself
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: mutual_aid_organized
            value: true
        exhaustionCost: 3
        nextNodeId: days_later
      - id: find_someone_else_to_manage
        label: Find a trusted neighbor to manage it, you cannot do everything
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 3
          - type: world_fact
            target: mutual_aid_organized
            value: true
        exhaustionCost: 1
        nextNodeId: days_later

  poor_buyer_conversation:
    id: poor_buyer_conversation
    text: >-
      {poor_buyer.name} is at home when you find them. Their house is warm but the larder
      is not. They are embarrassed that you noticed, and then embarrassed to be embarrassed,
      and then something in them settles and they sit down and tell you honestly what the
      week has been like. It is the first time anyone has asked. You listen for a long
      time without trying to fix it.
    choices:
      - id: help_directly
        label: Help directly from your own supplies, no conditions
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 3
            axis: trust
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: affection
          - type: faction
            target: village_folk
            value: 2
        exhaustionCost: 2
        nextNodeId: days_later
      - id: connect_to_aid_network
        label: Connect them to the mutual aid arrangement if one exists, or start one now
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: mutual_aid_organized
            value: true
        exhaustionCost: 1
        nextNodeId: days_later
      - id: just_listen
        label: Just listen, sometimes being heard is the first thing
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: affection
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: days_later

  profiteer_watches:
    id: profiteer_watches
    text: >-
      {profiteer.name} has been watching. You notice them noticing, which they allow you
      to see, which means it is deliberate. At the end of the second day, they approach
      you directly, in public, which is also deliberate. "You are bad for business," they
      say pleasantly. "But effective. I respect effective." They hold out their hand. "I
      would rather work with you than against you. What does that look like?"
    choices:
      - id: accept_the_offer
        label: Accept, working with them is faster than fighting them
        consequences:
          - type: relationship
            target: '{profiteer.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: profiteer_allied
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: days_later
      - id: refuse_the_offer
        label: Refuse, cooperation implies complicity
        consequences:
          - type: relationship
            target: '{profiteer.id}'
            value: -2
            axis: rivalry
          - type: faction
            target: village_folk
            value: 1
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: days_later

  days_later:
    id: days_later
    text: >-
      Five days after the prices first rose, the town has found a kind of equilibrium.
      Not a good one. But a functional one. {profiteer.name} is still profitable, though
      less so than they planned. {poor_buyer.name} has enough, barely. The mutual aid, if
      it exists, is creaking but holding. The siege has not yet come. When it does, every
      decision made in this market week will matter more than it does right now.
    choices:
      - id: maintain_what_you_built
        label: Keep working to maintain whatever structure you helped create this week
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: turn_attention_to_siege_readiness
        label: Shift your attention to siege readiness, the economics matter less than the walls
        consequences:
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: watch_what_profiteer_does_next
        label: Keep an eye on {profiteer.name}, they are not done
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 0
        nextNodeId: profiteer_next_move

  profiteer_next_move:
    id: profiteer_next_move
    text: >-
      {profiteer.name} is not done. Over the following days, they make two quiet moves.
      First, they buy out the remaining independent grain holders in the village, legally,
      at slightly above current prices. Second, they circulate a rumor that the town
      council has authorized them as official siege provisioner. The rumor is not entirely
      false, depending on how you read the council session. They are consolidating.
    choices:
      - id: challenge_the_rumor
        label: Challenge the rumor publicly before it becomes accepted fact
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: faction
            target: village_folk
            value: 2
          - type: faction
            target: merchants_guild
            value: -2
          - type: world_fact
            target: profiteer_narrative_contested
            value: true
        exhaustionCost: 2
        nextNodeId: siege_economy
      - id: verify_the_council_position
        label: Go to the council and verify exactly what was or was not authorized
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: supply_contract_status_known
            value: true
        exhaustionCost: 1
        nextNodeId: siege_economy
      - id: work_within_the_system
        label: Accept the reality and work within it, challenge from inside rather than outside
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: profiteer_allied
            value: true
        exhaustionCost: 0
        nextNodeId: siege_economy

  siege_economy:
    id: siege_economy
    text: >-
      The siege economy settles into a shape that will define the next few weeks. {profiteer.name}
      is a central node in it, for better or worse. The mutual aid, if it exists, runs alongside.
      The council has set some controls and not others. {poor_buyer.name} is surviving. The
      question of how fairly the siege is weathered depends heavily on choices made in the
      market this week and the next. Nothing about this is finished yet.
    choices:
      - id: stay_involved_in_distribution
        label: Stay actively involved in how resources move through the town
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
          - type: world_fact
            target: community_fed
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: step_back_from_economics
        label: Step back from the economics, focus on the walls and the fight
        consequences:
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
          - type: stat
            target: strength
            value: 1
        exhaustionCost: 1
        nextNodeId: null
      - id: document_what_happened
        label: Document everything, the price gouging, the mutual aid, the council decisions, for after
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 0
        nextNodeId: profiteer_account_written

  profiteer_account_written:
    id: profiteer_account_written
    text: >-
      The account takes two hours to write. What {profiteer.name} did, how the market
      responded, what the council did and did not do, who was helped and who was not.
      You read it back and it is both exactly what happened and also not quite the whole
      truth. The numbers are right. The human cost is harder to write down. You try anyway.
    choices:
      - id: share_the_account
        label: Share the account with {poor_buyer.name} and others most affected
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: trust
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: profiteer_narrative_contested
            value: true
        exhaustionCost: 1
        nextNodeId: profiteer_legacy
      - id: keep_the_account
        label: Keep it, this is for after the siege, not for now
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: profiteer_legacy

  price_floor_attempt:
    id: price_floor_attempt
    text: >-
      The council is presented with a motion for a permanent price floor on basic goods
      during declared emergencies. {profiteer.name} speaks against it with impressive
      preparation. The vote is close. It passes or fails depending on how much work was
      done in the room before the motion came up. If you spent your capital here, it shows.
    choices:
      - id: motion_passes
        label: The motion passes, a small structural win
        consequences:
          - type: faction
            target: village_folk
            value: 3
          - type: faction
            target: merchants_guild
            value: -2
          - type: world_fact
            target: price_controls_proposed
            value: true
        exhaustionCost: 0
        nextNodeId: profiteer_legacy
      - id: motion_fails
        label: The motion fails, {profiteer.name} wins this round
        consequences:
          - type: faction
            target: merchants_guild
            value: 1
          - type: faction
            target: village_folk
            value: -1
        exhaustionCost: 0
        nextNodeId: profiteer_legacy

  profiteer_legacy:
    id: profiteer_legacy
    text: >-
      When the siege comes, {profiteer.name}'s stores are a fact of life. Whether they
      are a benefit or a stranglehold depends on the terms negotiated, the controls
      enacted or not enacted, and the goodwill or ill-will generated in the market week.
      {poor_buyer.name} is still here. Still managing. What happened in the market was
      not the last word. But it was the first.
    choices:
      - id: hold_profiteer_accountable_after
        label: Commit to holding {profiteer.name} accountable when the siege is over
        consequences:
          - type: world_fact
            target: profiteer_confronted
            value: true
          - type: relationship
            target: '{profiteer.id}'
            value: -2
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: null
      - id: acknowledge_complexity
        label: Acknowledge that {profiteer.name} was also part of what kept people fed
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 0
        nextNodeId: null

  poor_buyer_thanks:
    id: poor_buyer_thanks
    text: >-
      {poor_buyer.name} finds you a week later with something in their hands, a small
      jar of preserves, homemade, labeled in their own handwriting. "I cannot give much,"
      they say. "But I wanted to give something." They hand it over with the specific
      dignity of a person who has been on the receiving end too many times and wants,
      for once, to be on the other side. You take it with both hands.
    choices:
      - id: accept_with_gratitude
        label: Accept it with genuine gratitude, the gesture matters more than the jar
        consequences:
          - type: relationship
            target: '{poor_buyer.id}'
            value: 3
            axis: affection
          - type: relationship
            target: '{poor_buyer.id}'
            value: 2
            axis: trust
          - type: relationship_tag
            target: '{poor_buyer.id}'
            value: mutual_aid_bond
        exhaustionCost: 0
        nextNodeId: profiteer_legacy
      - id: redirect_the_thanks
        label: Accept it but redirect the thanks to the community effort that made it possible
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
        exhaustionCost: 0
        nextNodeId: profiteer_legacy

  market_day_contrast:
    id: market_day_contrast
    text: >-
      When the regular market day comes a fortnight after the crisis, the prices are
      different again. Not back to before, but lower than the emergency peak. {profiteer.name}
      is there, ledger open, assessing the new normal. {poor_buyer.name} is also there,
      buying a smaller amount than usual but able to pay for it. The market is a thermometer
      for what the town survived and what it lost in the surviving.
    choices:
      - id: observe_the_market
        label: Walk the market and read what it tells you about how the town has changed
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: profiteer_confronted
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: speak_to_both_profiteer_and_poor_buyer
        label: Speak to both {profiteer.name} and {poor_buyer.name} in the same morning, see what each reveals
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: null
