id: secret_alliance
name: The Secret Alliance
tags:
  - intrigue
  - faction
  - social
storyline: town_politics
chapter: 3
reentry_recap: "Someone has been watching how you handled the town's troubles. They want to offer you something in return."

preconditions:
  - operator: or
    conditions:
      - type: world_fact
        key: guild_conflict_resolved
        value: true
      - type: world_fact
        key: testified_truthfully
        value: true

roles:
  - id: conspirator
    label: A Quiet Conspirator
    archetypeFilter:
      - merchant
      - blacksmith
    traitRequirements:
      cunning:
        min: 5

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {conspirator.name} catches you alone at the end of the day, in the alley behind the
      forge or at the back of the empty hall. Their voice is low. "A few of us have been
      talking. About who actually runs this town. The guild masters. The magistrate. The same
      families making the same decisions for thirty years." They pause. "We think it is time
      that changed. And we think you are someone who could be part of it."
    choices:
      - id: listen_fully
        label: Tell them to keep talking, you want to hear the whole plan
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: ask_for_details
        label: Ask who else is involved before committing to anything
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: asked_details
      - id: ask_why_you
        label: Ask why they approached you specifically
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: why_you_asked
      - id: decline
        label: Thank them but decline, you do not work in the shadows
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: -1
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: declined

  why_you_asked:
    id: why_you_asked
    text: >-
      {conspirator.name} does not hesitate. "Because you have been paying attention since you
      arrived. Not in the obvious ways. In the useful ones." They count on their fingers.
      "You listened at the meeting before you spoke. You found out who was recording it. You
      went to the magistrate and came out without owing them anything visible." They look at
      you. "We need someone who can operate in rooms we cannot enter without being noticed.
      That is a specific skill. You have it."
    choices:
      - id: listen_after_why
        label: Ask them to continue, you are listening
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: ask_details_after_why
        label: Ask who else is involved now that you understand why they came to you
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: asked_details
      - id: push_back_on_assessment
        label: Tell them their read of you may be right but their plan may not be worth it
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: respect
        exhaustionCost: 1
        nextNodeId: declined

  listened:
    id: listened
    text: >-
      The plan is ambitious and not entirely reckless. A network of craftsmen, a few merchants,
      one sympathetic guard captain. They want to shift who controls the supply contracts, the
      trade levies, the appointment of guild representatives. Not a coup, a rerouting. Power
      moved through channels rather than seized across barricades. {conspirator.name} watches
      you process it. "We need someone people trust," they say. "Someone not already known as
      a player."
    choices:
      - id: join_the_alliance
        label: Agree to join, the cause is real and so is the opportunity
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: faction
            target: craftsmen_guild
            value: 2
          - type: faction
            target: nobility
            value: -1
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: joined_alliance
      - id: ask_about_risk
        label: Ask what happens if this fails, specifically to you
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: risk_assessed
      - id: ask_for_time
        label: Tell them you need two days to think
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: time_requested

  risk_assessed:
    id: risk_assessed
    text: >-
      {conspirator.name} respects the question. "If it fails, the worst case is public
      embarrassment for the craftsmen who are visible. You are not visible. You are a
      facilitator." They fold their hands. "The magistrate knows the current system is
      unstable. They won't burn it down to protect it. The guild masters are a different
      question." They pause. "The risk is real but narrow. It is the kind of risk you
      take when the alternative is watching the system decay and pretending you did not see it."
    choices:
      - id: join_after_risk_assessment
        label: Join. You have heard the risk and it is acceptable.
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
          - type: faction
            target: craftsmen_guild
            value: 2
        exhaustionCost: 1
        nextNodeId: joined_alliance
      - id: decline_after_risk
        label: The risk is real enough. Decline.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: -1
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: declined

  time_requested:
    id: time_requested
    text: >-
      {conspirator.name} nods. "Two days. No longer. We are moving whether you are part of
      it or not." They leave you with the shape of the plan and the weight of the choice.
      Two days is enough time to join, to investigate further, or to decide what to do with
      what you know if you are going to do something else with it.
    choices:
      - id: join_after_time
        label: Return in two days and join
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: joined_alliance
      - id: investigate_in_two_days
        label: Use the two days to verify the alliance is what they say it is
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 2
        nextNodeId: asked_details
      - id: take_to_magistrate_after_time
        label: Take what you know to the magistrate within the two days
        preconditions:
          - type: world_fact
            key: magistrate_ally
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_betrayed
            value: true
          - type: faction
            target: nobility
            value: 2
        exhaustionCost: 1
        nextNodeId: alliance_reported

  asked_details:
    id: asked_details
    text: >-
      {conspirator.name} names three names: a senior craftsman, a young guard lieutenant,
      a merchant with cross-guild connections. Real people you know. Good people, mostly.
      But also people whose trust would be expensive to burn. You have what you need to
      decide, or to do something else with what you know. The lieutenant's name is a
      surprise. If the guard is involved, the alliance has reach you did not expect.
    choices:
      - id: join_armed_with_names
        label: Join, knowing who the other players are
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: joined_alliance
      - id: use_names_as_leverage
        label: Take the names to the magistrate, this is leverage worth having
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: faction
            target: nobility
            value: 2
          - type: relationship
            target: '{conspirator.id}'
            value: -3
            axis: rivalry
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_reported
      - id: hold_names_as_insurance
        label: Hold the names without acting, they are insurance not ammunition yet
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 0
        nextNodeId: declined

  joined_alliance:
    id: joined_alliance
    text: >-
      The alliance begins quietly. Your role is what {conspirator.name} described: a face
      in rooms the others cannot enter, a voice that carries without being attached to a
      faction. Two weeks in, you have passed information twice and attended one meeting you
      should not have been at. It is working. The question is what working means here, and
      whether you will still agree with the goal once you see where the rerouting actually
      leads.
    choices:
      - id: stay_fully_committed
        label: Stay fully committed. You made your choice.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: joined_secret_alliance
            value: true
          - type: faction
            target: craftsmen_guild
            value: 1
        exhaustionCost: 1
        nextNodeId: alliance_consequences
      - id: watch_for_red_lines
        label: Stay involved but define your own limits, some things you will not do
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: conspirator_test
      - id: begin_to_withdraw
        label: Start looking for a way to step back without burning what you know
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: watching_aftermath

  alliance_reported:
    id: alliance_reported
    text: >-
      The magistrate receives your report without surprise. "I was aware of two of the three
      names," they say. "The lieutenant is new." They make a note. "What you have done is
      useful. It is also dangerous if {conspirator.name} finds out before we are ready to
      act on it." They look at you directly. "Stay in contact. Do not let them know you came
      here. If you can, get invited to the next meeting." You are now an informant. That word
      has weight. You feel it.
    choices:
      - id: accept_informant_role
        label: Accept the role. You chose a side and this is what that means.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: nobility
            value: 3
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: informant_consequences
      - id: pull_back_after_report
        label: Give the magistrate what you already know and refuse further involvement
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: nobility
            value: 1
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 0
        nextNodeId: informant_consequences

  declined:
    id: declined
    text: >-
      {conspirator.name} studies you for a moment. "All right," they say. "I hope I have
      not misjudged you." They walk away without another word. What they mean is: they hope
      you will not tell anyone. That is a different thing from trust. You are now in possession
      of a secret that belongs to people you have not joined. That is its own kind of
      entanglement.
    choices:
      - id: assure_silence
        label: Call after them, their secret is safe
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
        exhaustionCost: 0
        nextNodeId: watching_aftermath
      - id: hold_it_as_leverage
        label: Say nothing. The knowledge is leverage you can use without spending.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 0
        nextNodeId: watching_aftermath
      - id: report_to_magistrate_from_decline
        label: Take it to the magistrate. You declined to join and you will not protect it either.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: nobility
            value: 2
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_reported

  watching_aftermath:
    id: watching_aftermath
    text: >-
      You watch the alliance work from outside it over the following two weeks. Small things
      shift: a supply contract re-routed, a guild representative replaced, a trade levy quietly
      adjusted. {conspirator.name} moves through town with the careful ease of someone executing
      a plan. They do not approach you again. You have been assessed and filed: not a threat,
      not an asset, a neutral element. Whether that suits you depends on what you planned to
      do with your neutrality.
    choices:
      - id: reconsider_joining
        label: Reconsider. The alliance is working and you are on the outside of it.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: use_neutrality_as_cover
        label: Use the neutrality. Being unassigned is its own kind of position.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 0
        nextNodeId: alliance_long_view
      - id: report_what_you_observe
        label: Start noting the specific changes you observe and report them to the magistrate
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 2
        nextNodeId: alliance_reported

  alliance_consequences:
    id: alliance_consequences
    text: >-
      The alliance's work begins to surface in ways the general public can see. A long-standing
      guild master steps down, citing personal reasons. A new face appears on the trade council.
      The levy adjustments save craftsmen money they were not expecting. The town does not know
      why things are changing. But they feel the change, and mostly, they approve of it. You
      were part of this, or were not, or made it possible by staying quiet. All of those are
      positions with consequences.
    choices:
      - id: take_quiet_credit
        label: When people ask why things have improved, let them think you had something to do with it
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: craftsmen_guild
            value: 1
        exhaustionCost: 1
        nextNodeId: alliance_long_view
      - id: deny_involvement
        label: Deny any involvement. What alliance?
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 0
        nextNodeId: alliance_long_view
      - id: watch_for_backlash
        label: Watch carefully. Any rerouting of power creates people who lose. Find them.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 1
        nextNodeId: power_losers

  informant_consequences:
    id: informant_consequences
    text: >-
      Playing both sides of a conflict has a texture you did not entirely anticipate. The
      magistrate asks careful questions. {conspirator.name} continues treating you as a neutral
      element. The gap between what each knows about you is a space you are living inside.
      It is not comfortable. It is, however, effective. For now. The question is how long
      the gap stays invisible.
    choices:
      - id: widen_gap_further
        label: Keep widening the gap. Feed each side just enough to maintain the arrangement.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 2
        nextNodeId: double_agent_risk
      - id: choose_a_side_finally
        label: Choose the magistrate's side fully and end the double arrangement
        consequences:
          - type: faction
            target: nobility
            value: 2
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_external_pressure
      - id: withdraw_from_both
        label: Withdraw from both the magistrate and the alliance before the gap collapses
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 1
        nextNodeId: watching_aftermath

  double_agent_risk:
    id: double_agent_risk
    text: >-
      {conspirator.name} asks you, quietly and without warning, if you have spoken to the
      magistrate recently. The question is not accusatory. It is exploratory. They are
      checking whether you are what they think you are. How you answer will determine whether
      the arrangement continues, collapses, or transforms into something neither of you planned.
    choices:
      - id: lie_cleanly
        label: Lie cleanly. Nothing happened. You have been managing your own affairs.
        preconditions:
          - type: trait
            key: cunning
            min: 5
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_consequences
      - id: admit_the_contact
        label: Admit you have spoken to the magistrate without admitting what you said
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: -2
            axis: trust
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 2
        nextNodeId: conspirator_test
      - id: turn_the_question_back
        label: Ask {conspirator.name} why they are asking that, specifically, right now
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: respect
        exhaustionCost: 1
        nextNodeId: alliance_consequences

  conspirator_test:
    id: conspirator_test
    text: >-
      {conspirator.name} gives you your first real task three days after you join: attend a
      meeting of the east road committee as yourself, not as an operative, and afterward
      describe what the mood was. That is all. Observe and report. You are being tested on
      whether you can do the simple thing before you are trusted with the difficult thing.
    choices:
      - id: attend_and_report_honestly
        label: Attend and give an honest report. Earn the trust properly.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 2
        nextNodeId: alliance_consequences
      - id: attend_and_report_selectively
        label: Attend but omit one detail. See if they notice. Test them back.
        preconditions:
          - type: trait
            key: cunning
            min: 4
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 2
        nextNodeId: alliance_consequences
      - id: refuse_the_task
        label: Refuse. You agreed to the alliance but not to becoming a reporter.
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: -2
            axis: trust
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: watching_aftermath

  alliance_long_view:
    id: alliance_long_view
    text: >-
      A month past the alliance's most visible activity, the dust has settled into a new
      pattern. Who benefits, who lost, who knows you were involved and who does not, all
      of that has crystallised. Your position in this political landscape is different from
      what it was. Not better or worse in any simple accounting, just different. The question
      now is what you build on that difference.
    choices:
      - id: build_independent_position
        label: Begin building your own independent political position from what you now know
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 2
        nextNodeId: alliance_settled
      - id: deepen_alliance_involvement
        label: Go back to {conspirator.name} and ask what comes next. The first move worked.
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: faction
            target: craftsmen_guild
            value: 1
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_operational
      - id: step_back_and_observe
        label: Step back for now. You have learned something. Use the quiet to process it.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: alliance_settled

  power_losers:
    id: power_losers
    text: >-
      You find them without much effort. The guild master who lost a contract sits at the
      same table every morning, quieter than before. The tax collector whose levy adjustment
      did not go their way is filing something formal, slowly. These are not dangerous enemies
      yet. They are people whose discomfort could be useful, or could become a problem,
      depending on what they conclude about who is behind the changes. You have not been named.
      But you notice one of them watching you cross the square.
    choices:
      - id: reassure_the_watcher
        label: Cross to the watcher and introduce yourself openly. Give them nothing to imagine.
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: world_fact
            target: political_player_known
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_watcher_reckoned
      - id: avoid_the_watcher
        label: Give the watcher nothing. Change your route and let time do the work.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: alliance_long_view
      - id: warn_conspirator_about_watcher
        label: Bring {conspirator.name} word about who is watching and from where
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_watcher_reckoned

  alliance_operational:
    id: alliance_operational
    text: >-
      The alliance is operational now. Not declared, not acknowledged, but functional:
      information moves, decisions get coordinated, resources are positioned without
      public announcement. You are inside something that works the way power actually
      works in a town like Ironhaven. Whether you built this deliberately or stumbled
      into it is not the question the alliance asks. It asks what you will do next.
    choices:
      - id: take_active_role
        label: Take an active role. You are inside this, so you should be shaping it.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: maintain_quiet_presence
        label: Maintain a quiet presence. Useful without being central.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 0
        nextNodeId: null

  alliance_external_pressure:
    id: alliance_external_pressure
    text: >-
      Something from outside the alliance is applying pressure: a merchant with
      different connections, or the magistrate asking questions, or the guard captain
      looking at the same patterns from a different angle. The alliance is not exposed
      but it is being noticed in the way that informal arrangements get noticed, by
      their effects rather than their structure. How you respond to the pressure matters.
    choices:
      - id: absorb_the_pressure
        label: Absorb the pressure. The alliance is solid enough to withstand scrutiny.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: adjust_the_structure
        label: Adjust the structure before the pressure becomes a confrontation
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 1
        nextNodeId: null

  alliance_watcher_reckoned:
    id: alliance_watcher_reckoned
    text: >-
      The person watching the alliance made a move, or they will, or they are still
      waiting for the right moment. You know they know. That is the operative fact.
      Whatever equilibrium you establish with them will define the shape of the
      alliance going forward. Power built on uncertainty is power that costs more
      to maintain. You would rather resolve this than manage it indefinitely.
    choices:
      - id: bring_watcher_in
        label: Bring them in. A person who knows enough to threaten is better inside than outside.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 1
        nextNodeId: alliance_operational
      - id: neutralise_watcher
        label: Neutralise the threat without confrontation. Remove the leverage quietly.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: faction
            target: merchants_guild
            value: -1
        exhaustionCost: 2
        nextNodeId: alliance_operational

  alliance_settled:
    id: alliance_settled
    text: >-
      The alliance has reached a kind of equilibrium. Not stable, not permanent, but
      functional for now. You are not the same person in Ironhaven as you were when
      this began. The town has a different shape from where you now stand. What you
      do next will be shaped by what you built here, whether you intended it as a
      foundation or not.
    choices:
      - id: build_on_the_foundation
        label: Build on what the alliance established. This is the foundation for whatever comes next.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: alliance_formed
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: step_back_from_alliance
        label: Step back from active involvement. The structure is there if you need it.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
